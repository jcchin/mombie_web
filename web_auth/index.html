<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Mombie – Welcome</title>

  <link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../vendor/fontawesome-free/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Catamaran:700,900&family=Muli" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(160deg, #1a1040 0%, #3b2f6e 60%, #7b4397 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Muli', sans-serif;
      color: #fff;
    }

    .auth-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .app-logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      margin-bottom: 1.2rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid #fdcc52;
      margin-bottom: 1rem;
      display: none;
    }

    .app-name {
      font-family: 'Catamaran', sans-serif;
      font-weight: 900;
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fdcc52;
      margin-bottom: 0.2rem;
    }

    h1 {
      font-family: 'Catamaran', sans-serif;
      font-weight: 700;
      font-size: 1.8rem;
      margin-bottom: 0.4rem;
    }

    .user-email {
      color: rgba(255,255,255,0.55);
      font-size: 0.9rem;
      margin-bottom: 1.8rem;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(253,204,82,0.15);
      border: 1px solid rgba(253,204,82,0.4);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.85rem;
      color: #fdcc52;
      margin-bottom: 2rem;
    }

    .sign-out-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.6);
      border-radius: 20px;
      padding: 8px 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .sign-out-btn:hover {
      border-color: rgba(255,255,255,0.6);
      color: #fff;
    }

    #loading {
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
    }

    #content { display: none; }
  </style>
</head>

<body>
  <div class="auth-card">
    <img class="app-logo"
         src="https://raw.githubusercontent.com/jcchin/mombie_flutter/master/assets/images/icon.png"
         alt="Mombie">
    <div class="app-name">Mombie</div>

    <div id="loading">Verifying sign-in…</div>

    <div id="content">
      <img id="avatar" class="avatar" alt="Profile photo">
      <h1 id="user-name">Welcome</h1>
      <div id="user-email" class="user-email"></div>
      <div class="status-badge">
        <i class="fas fa-check-circle"></i>
        Signed in with Google
      </div>
      <br>
      <a href="../" class="sign-out-btn" id="sign-out">
        <i class="fas fa-arrow-left"></i> Back to Mombie
      </a>
    </div>
  </div>

  <script>
    function parseJwt(token) {
      const payload = token.split('.')[1];
      const decoded = atob(payload.replace(/-/g, '+').replace(/_/g, '/'));
      return JSON.parse(decodeURIComponent(
        decoded.split('').map(c =>
          '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
        ).join('')
      ));
    }

    const credential = sessionStorage.getItem('mombie_credential');

    if (!credential) {
      window.location.href = '../';
    } else {
      const user = parseJwt(credential);

      document.getElementById('user-name').textContent = 'Hi, ' + (user.given_name || user.name) + '!';
      document.getElementById('user-email').textContent = user.email;

      if (user.picture) {
        const avatar = document.getElementById('avatar');
        avatar.src = user.picture;
        avatar.style.display = 'inline-block';
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';

      document.getElementById('sign-out').addEventListener('click', function () {
        sessionStorage.removeItem('mombie_credential');
      });
    }
  </script>
</body>

</html>
